<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD Bingo</title>
<style>
:root {
  --bg: #f7f8fa;
  --surface: #fff;
  --text: #2c2e34;
  --text-mid: #666;
  --text-lt: #aaa;
  --purple: #7b5ea7;
  --purple-lt: #eae2f5;
  --green: #4a9c7d;
  --green-lt: #e3f1eb;
  --coral: #e57373;
  --coral-lt: #fdeaea;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Nunito", "Noto Sans SC", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: 0 auto;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.cell {
  aspect-ratio: 1/1;
  background: var(--surface);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.cell.active {
  background: var(--purple-lt);
}

.cell-text {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}

.star-badge {
  position: absolute;
  top: 2px;
  left: 2px;
  font-size: 10px;
  opacity: 0.8;
  pointer-events: none;
}

.task-btn {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: var(--purple);
  color: white;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 10px;
}

.task-panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.task-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  z-index: 101;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: 0.36s cubic-bezier(0.4,0,0.2,1);
  max-height: 80vh;
  padding: 20px;
}

.task-panel.open,
.task-panel-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.task-panel.open {
  transform: translateY(0);
}

.task-panel-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.task-panel-actions button {
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
}

.tp-star-select {
  background: var(--purple-lt);
  color: #7b5ea7;
}
.tp-star-manage {
  background: var(--green-lt);
  color: var(--green);
}

#starManageOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
#starManageSheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  z-index: 201;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: 0.36s;
  padding: 20px;
  max-height: 80vh;
}
#starManageOverlay.open,
#starManageSheet.open {
  opacity: 1;
  pointer-events: all;
}
#starManageSheet.open {
  transform: translateY(0);
}

.sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.sheet-title {
  font-weight: 900;
  font-size: 16px;
}
.sheet-close {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: #f2f2f2;
  cursor: pointer;
}

.task-add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.task-add-input {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid var(--purple-lt);
  border-radius: 8px;
  font-size: 14px;
}
.task-add-btn {
  padding: 0 14px;
  background: var(--purple);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.sched-date-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}
.star-del-btn {
  background: var(--coral-lt);
  color: var(--coral);
  border: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">AD Bingo</div>
  </div>

  <div class="grid" id="grid">
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
    <div class="cell"><div class="cell-text"></div></div>
  </div>

  <button class="task-btn" id="openTaskPanel">打开任务面板</button>
</div>

<div class="task-panel-overlay" id="taskOverlay"></div>
<div class="task-panel" id="taskPanel">
  <div class="task-panel-actions">
    <button class="tp-star-select">随机选25个星标</button>
    <button class="tp-star-manage">管理星标习惯</button>
  </div>
</div>

<div id="starManageOverlay"></div>
<div id="starManageSheet">
  <div class="sheet-header">
    <div class="sheet-title">管理星标习惯</div>
    <button class="sheet-close" id="starManageClose">✕</button>
  </div>
  <div class="task-add-row">
    <input type="text" id="starAddInput" placeholder="输入习惯">
    <button id="starAddBtn">添加</button>
  </div>
  <div id="starredHabitsList"></div>
</div>

<script>
const STARRED_HABITS_KEY = 'ad_bingo_starred_habits';
const SELECTED_25_KEY = 'ad_bingo_selected_25';
const RESET_ANCHOR_KEY = 'ad_bingo_reset_anchor';

if (!localStorage.getItem(STARRED_HABITS_KEY)) localStorage.setItem(STARRED_HABITS_KEY, JSON.stringify([]));
if (!localStorage.getItem(RESET_ANCHOR_KEY)) localStorage.setItem(RESET_ANCHOR_KEY, new Date().toDateString());

function checkDailyReset() {
  const today = new Date().toDateString();
  const lastReset = localStorage.getItem(RESET_ANCHOR_KEY);
  if (lastReset !== today) {
    localStorage.removeItem(SELECTED_25_KEY);
    document.querySelectorAll('.cell.active').forEach(cell => cell.classList.remove('active'));
    localStorage.setItem(RESET_ANCHOR_KEY, today);
    const stars = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
    if (stars.length >= 25) randomSelect25StarredHabits();
  }
}

function randomSelect25StarredHabits() {
  const starred = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
  if (starred.length < 25) {
    alert('至少要25个星标习惯才能随机');
    return;
  }
  const shuffled = [...starred].sort(() => 0.5 - Math.random());
  const selected = shuffled.slice(0, 25);
  localStorage.setItem(SELECTED_25_KEY, JSON.stringify(selected));
  renderSelected25ToGrid(selected);
  updateAllStarBadges();
}

function renderSelected25ToGrid(habits) {
  const cells = document.querySelectorAll('.cell');
  cells.forEach((c, i) => {
    const t = c.querySelector('.cell-text');
    t.textContent = habits[i] || '';
  });
}

function updateAllStarBadges() {
  const starred = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
  document.querySelectorAll('.cell').forEach(cell => {
    const txt = cell.querySelector('.cell-text').textContent.trim();
    const badge = cell.querySelector('.star-badge');
    if (starred.includes(txt)) {
      if (!badge) {
        const s = document.createElement('span');
        s.className = 'star-badge';
        s.textContent = '⭐';
        cell.appendChild(s);
      }
    } else {
      if (badge) badge.remove();
    }
  });
}

function openStarManagePanel() {
  renderStarredHabitsList();
  document.getElementById('starManageOverlay').classList.add('open');
  document.getElementById('starManageSheet').classList.add('open');
}

function renderStarredHabitsList() {
  const list = document.getElementById('starredHabitsList');
  const arr = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
  list.innerHTML = '';
  arr.forEach(h => {
    const d = document.createElement('div');
    d.className = 'sched-date-item';
    d.innerHTML = `<div>${h}</div><button class="star-del-btn" data-h="${h}">✕</button>`;
    list.appendChild(d);
  });
  document.querySelectorAll('.star-del-btn').forEach(b => {
    b.onclick = () => {
      const v = b.dataset.h;
      let a = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
      a = a.filter(x => x !== v);
      localStorage.setItem(STARRED_HABITS_KEY, JSON.stringify(a));
      renderStarredHabitsList();
      updateAllStarBadges();
    };
  });
}

document.getElementById('starAddBtn').onclick = () => {
  const i = document.getElementById('starAddInput');
  const v = i.value.trim();
  if (!v) return;
  let a = JSON.parse(localStorage.getItem(STARRED_HABITS_KEY) || '[]');
  if (a.includes(v)) {
    i.value = '';
    return;
  }
  a.push(v);
  localStorage.setItem(STARRED_HABITS_KEY, JSON.stringify(a));
  i.value = '';
  renderStarredHabitsList();
  updateAllStarBadges();
};

document.getElementById('starManageClose').onclick = () => {
  document.getElementById('starManageOverlay').classList.remove('open');
  document.getElementById('starManageSheet').classList.remove('open');
};

document.querySelector('.tp-star-select').onclick = () => {
  randomSelect25StarredHabits();
  document.getElementById('taskPanel').classList.remove('open');
  document.getElementById('taskOverlay').classList.remove('open');
};
document.querySelector('.tp-star-manage').onclick = openStarManagePanel;

document.getElementById('openTaskPanel').onclick = () => {
  document.getElementById('taskPanel').classList.add('open');
  document.getElementById('taskOverlay').classList.add('open');
};
document.getElementById('taskOverlay').onclick = () => {
  document.getElementById('taskPanel').classList.remove('open');
  document.getElementById('taskOverlay').classList.remove('open');
};

document.querySelectorAll('.cell').forEach(c => {
  c.onclick = () => c.classList.toggle('active');
});

window.addEventListener('load', () => {
  checkDailyReset();
  const saved = JSON.parse(localStorage.getItem(SELECTED_25_KEY) || '[]');
  if (saved.length === 25) renderSelected25ToGrid(saved);
  updateAllStarBadges();
});
</script>
</body>
</html>
